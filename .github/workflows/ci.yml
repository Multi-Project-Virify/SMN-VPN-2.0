name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  rust-check:
    name: Проверка smn-crypto-core (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smn-crypto-core
    steps:
      - uses: actions/checkout@v4

      - name: Установить Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Кэш зависимостей
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: smn-crypto-core

      # ИЗМЕНЕНО: continue-on-error убран. Зелёная галочка на сломанном
      # крипто-коде хуже, чем отсутствие CI вообще — она создаёт ложное
      # чувство безопасности у ревьюеров. Это блокеры теперь, не рекомендации.
      - name: cargo check
        run: cargo check --all-features

      - name: cargo test
        run: cargo test --all-features

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-features -- -D warnings

      - name: Установить cargo-audit
        run: cargo install cargo-audit --locked

      # Проверка известных CVE в зависимостях (x25519-dalek, chacha20poly1305
      # и т.д.) на каждый PR — раньше отсутствовала полностью.
      - name: cargo audit
        run: cargo audit

  secret-scan:
    name: Проверка на утечку секретов
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}